<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RI Health Inspections</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        header {
            background: #0f172a;
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        header .logo {
            font-size: 1.4rem;
        }

        header h1 {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        header p {
            font-size: 0.72rem;
            opacity: 0.55;
            margin-top: 2px;
        }

        /* ── Layout ── */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #map {
            flex: 1;
            min-height: 0;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: 380px;
            background: white;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #e2e8f0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-top {
            padding: 14px 16px;
            border-bottom: 1px solid #e2e8f0;
            background: white;
        }

        .search-wrap {
            position: relative;
        }

        .search-wrap svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            width: 16px;
            height: 16px;
            pointer-events: none;
        }

        .search-wrap input {
            width: 100%;
            padding: 9px 12px 9px 34px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.875rem;
            color: #1e293b;
            background: #f8fafc;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .search-wrap input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
            background: white;
        }

        .search-wrap input::placeholder {
            color: #94a3b8;
        }

        .sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            scroll-behavior: smooth;
        }

        /* ── Placeholder ── */
        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            color: #94a3b8;
            text-align: center;
            gap: 10px;
        }

        .placeholder svg {
            width: 48px;
            height: 48px;
            opacity: 0.4;
        }

        .placeholder p {
            font-size: 0.875rem;
        }

        /* ── Location Header ── */
        .loc-header {
            margin-bottom: 16px;
        }

        .loc-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.3;
        }

        .loc-meta {
            display: flex;
            flex-direction: column;
            gap: 3px;
            margin-top: 6px;
        }

        .loc-meta span {
            font-size: 0.78rem;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ── Inspection Card ── */
        .inspection-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 6px;
        }

        .card-date {
            font-weight: 600;
            font-size: 0.875rem;
            color: #1e293b;
        }

        .card-type {
            font-size: 0.78rem;
            color: #64748b;
            margin-bottom: 10px;
        }

        .badge {
            padding: 3px 9px;
            border-radius: 99px;
            font-size: 0.68rem;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .badge-clean {
            background: #dcfce7;
            color: #166534;
        }

        .badge-violations {
            background: #fee2e2;
            color: #991b1b;
        }

        .violation {
            font-size: 0.8rem;
            color: #dc2626;
            padding: 6px 10px;
            background: #fff5f5;
            border-left: 3px solid #fca5a5;
            border-radius: 0 5px 5px 0;
            margin: 4px 0;
            line-height: 1.4;
        }

        .no-violations {
            font-size: 0.8rem;
            color: #16a34a;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .report-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 10px;
            font-size: 0.78rem;
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }

        .report-link:hover { text-decoration: underline; }

        /* ── Loader ── */
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            color: #64748b;
            gap: 12px;
            font-size: 0.875rem;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Error ── */
        .error-msg {
            font-size: 0.875rem;
            color: #dc2626;
            padding: 14px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            line-height: 1.5;
        }

        /* ── Leaflet tooltip overrides ── */
        .leaflet-tooltip {
            border-radius: 8px !important;
            border: none !important;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15) !important;
            padding: 8px 12px !important;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
            font-size: 0.8rem !important;
            color: #1e293b !important;
        }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }

            #map {
                height: 52dvh;
                flex: none;
            }

            #sidebar {
                width: 100%;
                flex: 1;
                border-left: none;
                border-top: 1px solid #e2e8f0;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🏥</div>
        <div>
            <h1>Rhode Island Health Inspections</h1>
            <p>Tap a pin to view inspection history</p>
        </div>
    </header>

    <div class="main-content">
        <div id="map"></div>

        <div id="sidebar">
            <div class="sidebar-top">
                <div class="search-wrap">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
                    </svg>
                    <input type="search" id="search-input" placeholder="Search locations or addresses…" autocomplete="off" />
                </div>
            </div>

            <div class="sidebar-body" id="sidebar-body">
                <div class="placeholder">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0L6.343 16.657a8 8 0 1111.314 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <p>Click a map pin to view inspection history</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: true }).setView([41.7798, -71.4373], 11);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        const sidebarBody = document.getElementById('sidebar-body');
        const searchInput = document.getElementById('search-input');

        let allMarkers = [];
        let activeMarker = null;

        const defaultStyle = { radius: 7, fillColor: '#3b82f6', color: 'white', weight: 2, opacity: 1, fillOpacity: 0.85 };
        const activeStyle  = { radius: 9, fillColor: '#f59e0b', color: 'white', weight: 2, opacity: 1, fillOpacity: 1 };

        function createMarker(loc) {
            const marker = L.circleMarker([loc.lat, loc.lng], { ...defaultStyle });

            marker.bindTooltip(
                `<b>${loc.name}</b><br>${loc.address}<br><small style="color:#64748b">Last inspected: ${loc.last_inspection}</small>`,
                { sticky: true }
            );

            marker.on('click', () => {
                if (activeMarker && activeMarker !== marker) {
                    activeMarker.setStyle(defaultStyle);
                }
                marker.setStyle(activeStyle);
                marker.bringToFront();
                activeMarker = marker;
                fetchInspectionData(loc);
                sidebarBody.scrollTop = 0;
            });

            marker.locationData = loc;
            return marker;
        }

        async function loadLocations() {
            try {
                const res = await fetch('locations_geocoded.json');
                const locations = await res.json();

                locations.forEach(loc => {
                    if (!loc.lat || !loc.lng) return;
                    const marker = createMarker(loc);
                    marker.addTo(map);
                    allMarkers.push(marker);
                });
            } catch (err) {
                console.error('Failed to load locations:', err);
            }
        }

        async function fetchInspectionData(loc) {
            sidebarBody.innerHTML = `
                <div class="loader">
                    <div class="spinner"></div>
                    <span>Loading inspection records…</span>
                </div>`;

            const encodedId = btoa(String(loc.id));
            const url = `/api-proxy/inspectionsData/${encodedId}`;

            try {
                const res = await fetch(url, { headers: { accept: 'application/json' } });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                renderInspections(loc, data);
            } catch (err) {
                sidebarBody.innerHTML = `
                    <div class="error-msg">
                        Could not load inspection data. The state server may be blocking cross-origin requests (CORS).
                    </div>`;
            }
        }

        function renderInspections(loc, data) {
            let html = `
                <div class="loc-header">
                    <div class="loc-name">${escHtml(loc.name)}</div>
                    <div class="loc-meta">
                        <span>📍 ${escHtml(loc.address)}</span>
                        <span>🗓 Last inspected: ${escHtml(loc.last_inspection)}</span>
                        <span>🏷 ${escHtml(loc.license_type)}</span>
                    </div>
                </div>`;

            if (!data || data.length === 0) {
                html += `<p style="color:#64748b;font-size:0.875rem;">No inspection history found.</p>`;
                sidebarBody.innerHTML = html;
                return;
            }

            data.forEach(inspection => {
                const date = (inspection.columns?.['0'] ?? '').replace('Inspection Date: ', '').trim();
                const type = (inspection.columns?.['1'] ?? '').replace('Inspection Purpose: ', '').trim();
                const violations = inspection.violations ? Object.values(inspection.violations).filter(v => v?.[0]) : [];
                const hasViolations = violations.length > 0;

                html += `<div class="inspection-card">
                    <div class="card-top">
                        <span class="card-date">${escHtml(date)}</span>
                        <span class="badge ${hasViolations ? 'badge-violations' : 'badge-clean'}">
                            ${hasViolations ? `${violations.length} Violation${violations.length !== 1 ? 's' : ''}` : 'Clean'}
                        </span>
                    </div>
                    <div class="card-type">${escHtml(type)}</div>`;

                if (hasViolations) {
                    violations.forEach(v => {
                        html += `<div class="violation">${escHtml(v[0])}</div>`;
                    });
                } else {
                    html += `<div class="no-violations">✓ No violations reported</div>`;
                }

                if (inspection.printablePath) {
                    const reportUrl = `https://ri.healthinspections.us/${inspection.printablePath.replace('../', '')}`;
                    html += `<a class="report-link" href="${escHtml(reportUrl)}" target="_blank" rel="noopener">
                        View Official Report →
                    </a>`;
                }

                html += `</div>`;
            });

            sidebarBody.innerHTML = html;
        }

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // Search: show/hide markers as user types
        searchInput.addEventListener('input', () => {
            const q = searchInput.value.trim().toLowerCase();
            allMarkers.forEach(marker => {
                const loc = marker.locationData;
                const match = !q
                    || loc.name.toLowerCase().includes(q)
                    || loc.address.toLowerCase().includes(q);

                if (match && !map.hasLayer(marker)) marker.addTo(map);
                if (!match && map.hasLayer(marker)) map.removeLayer(marker);
            });
        });

        loadLocations();
    </script>
</body>
</html>
