name: Weekly Reconcile & Rescan

on:
  schedule:
    - cron: '0 7 * * 1'  # Monday 7am UTC (3am ET)
  workflow_dispatch:

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run reconcile
        run: python3 scripts/refresh.py --reconcile
        env:
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}

      - name: Run full rescan
        run: python3 scripts/refresh.py --rescan
        env:
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/locations.json
          if git diff --staged --quiet; then
            echo "No changes — skipping deploy"
            echo "CHANGED=false" >> $GITHUB_ENV
          else
            git commit -m "Weekly reconcile & rescan"
            git push
            echo "CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Deploy to Fly.io
        if: env.CHANGED == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        if: env.CHANGED == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
